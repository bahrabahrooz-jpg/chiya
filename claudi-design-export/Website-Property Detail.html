<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: var(--surface-page); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  ::selection { background: var(--green-100); }

  /* ============ HEADER (solid, matches interior pages) ============ */
  .cxh { position: relative; left: 0; right: 0; z-index: 1200; }
  .cxh__inner { max-width: 1440px; margin-inline: auto; padding: 0 48px; height: 84px; display: flex; align-items: center; gap: 32px; }
  .cxh__brand { flex: none; }
  .cxh__nav { flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .cxh__link { display: inline-flex; align-items: center; padding: 9px 16px; font-family: var(--font-sans); font-size: 15px; font-weight: 500; text-decoration: none; border-radius: var(--radius-control); transition: color .16s, background-color .16s; cursor: pointer; background: none; border: none; }
  .cxh__actions { flex: none; display: flex; align-items: center; gap: 12px; }
  .cxh__lang { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 14px; font-weight: 600; padding: 6px 8px; border-radius: var(--radius-control); transition: color .16s, background-color .16s; }
  .cxh__divider { width: 1px; height: 22px; }
  .cxh--solid { background: var(--surface-card); border-bottom: 1px solid var(--border-subtle); }
  .cxh--solid .cxh__link { color: var(--text-secondary); }
  .cxh--solid .cxh__link:hover { color: var(--text-primary); background: var(--gray-50); }
  .cxh--solid .cxh__link--active { color: var(--brand-primary); font-weight: 600; }
  .cxh--solid .cxh__lang { color: var(--text-secondary); }
  .cxh--solid .cxh__lang:hover { background: var(--gray-50); }
  .cxh--solid .cxh__divider { background: var(--border-subtle); }

  /* ============ LAYOUT CONTAINER ============ */
  .pdp { max-width: 1440px; margin-inline: auto; padding: 0 48px; }
  .pdp-wrap { padding-bottom: 8px; }

  /* breadcrumb */
  .pdp-crumb { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; padding: 22px 0 18px; }
  .pdp-crumb__link { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--text-tertiary); text-decoration: none; border-radius: var(--radius-control); transition: color .14s; cursor: pointer; }
  .pdp-crumb__link:hover { color: var(--brand-primary); }
  .pdp-crumb__link svg { color: var(--green-600); }
  .pdp-crumb__sep { color: var(--gray-300); flex: none; }
  .pdp-crumb__current { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--text-secondary); }

  /* ============ TITLE ROW (above gallery) ============ */
  .pdp-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 28px; margin-bottom: 18px; }
  .pdp-head > div:first-child { flex: 1 1 auto; min-width: 0; }
  .pdp-head__badges { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .pdp-head__title { font-family: var(--font-display); font-weight: 600; font-size: 40px; line-height: 1.05; letter-spacing: -0.02em; color: var(--text-primary); margin: 0; text-wrap: balance; }
  .pdp-head__addr { display: inline-flex; align-items: center; gap: 7px; margin-top: 10px; font-family: var(--font-sans); font-size: 15.5px; color: var(--text-secondary); }
  .pdp-head__addr svg { color: var(--green-600); }
  .pdp-head__addr a { color: var(--text-secondary); text-decoration: none; }
  .pdp-head__addr a:hover { color: var(--brand-primary); text-decoration: underline; text-underline-offset: 3px; }
  .pdp-head__priceblock { flex: none; text-align: right; }
  .pdp-head__price { font-family: var(--font-sans); font-weight: 700; font-size: 34px; letter-spacing: -0.01em; color: var(--brand-primary); font-variant-numeric: tabular-nums; line-height: 1; }
  .pdp-head__pricenote { font-family: var(--font-sans); font-size: 13.5px; color: var(--text-tertiary); margin-top: 7px; }
  .pdp-head__actions { display: flex; align-items: center; gap: 9px; justify-content: flex-end; margin-top: 14px; }
  .pdp-iconbtn { display: inline-flex; align-items: center; gap: 8px; height: 42px; padding: 0 16px; background: var(--surface-card); border: 1px solid var(--border-default); border-radius: var(--radius-pill); cursor: pointer; font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--text-secondary); box-shadow: var(--shadow-xs); transition: border-color .15s, color .15s, background-color .15s; }
  .pdp-iconbtn:hover { border-color: var(--border-strong); color: var(--text-primary); background: var(--gray-50); }
  .pdp-iconbtn svg { color: var(--green-600); }
  .pdp-iconbtn--on { background: var(--green-50); border-color: var(--green-300); color: var(--green-800); }
  .pdp-iconbtn--on svg { color: var(--error-500); }

  /* ============ GALLERY (in-page, no modal) ============ */
  .pdp-gal { margin-bottom: 18px; }
  .pdp-gal__hero { position: relative; height: 540px; border-radius: var(--radius-card); overflow: hidden; background: var(--gray-100); box-shadow: var(--shadow-card); outline: none; }
  .pdp-gal__hero:focus-visible { box-shadow: var(--shadow-focus-brand); }
  .pdp-gal__img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .pdp-gal__img--enter { animation: pdpHeroFade .42s cubic-bezier(.2,.7,.2,1); }
  @keyframes pdpHeroFade { from { opacity: 0; transform: scale(1.015); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .pdp-gal__img--enter { animation: none; } }
  .pdp-gal__grad { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(11,32,24,.34), transparent 26%, transparent 66%, rgba(11,32,24,.42)); pointer-events: none; }
  .pdp-gal__tl { position: absolute; top: 16px; left: 16px; display: flex; gap: 8px; z-index: 3; }
  .pdp-gal__tr { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 3; }
  .pdp-gal__tour { position: absolute; left: 16px; bottom: 16px; z-index: 3; display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 13px; border-radius: var(--radius-pill); font-family: var(--font-sans); font-size: 12.5px; font-weight: 600; color: #fff; background: rgba(11,32,24,.6); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.18); }
  .pdp-gal__count { position: absolute; right: 16px; bottom: 16px; z-index: 3; display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 14px; border-radius: var(--radius-pill); font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: #fff; background: rgba(11,32,24,.6); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.18); font-variant-numeric: tabular-nums; }
  .pdp-gal__count svg { opacity: .85; }
  .pdp-gal__nav { position: absolute; top: 50%; transform: translateY(-50%); z-index: 4; width: 48px; height: 48px; border-radius: 50%; border: 1px solid rgba(255,255,255,.28); background: rgba(11,32,24,.42); color: #fff; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px); box-shadow: 0 6px 18px rgba(11,32,24,.22); transition: background-color .15s, transform .12s; }
  .pdp-gal__nav:hover { background: rgba(11,32,24,.66); }
  .pdp-gal__nav:active { transform: translateY(-50%) scale(.93); }
  .pdp-gal__nav--prev { left: 16px; }
  .pdp-gal__nav--next { right: 16px; }

  .pdp-gal__strip { margin-top: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .pdp-gal__strip--all { grid-template-columns: repeat(auto-fill, minmax(116px, 1fr)); }
  .pdp-gal__thumb { position: relative; padding: 0; border: none; background: var(--gray-100); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; aspect-ratio: 4 / 3; outline: none; box-shadow: inset 0 0 0 1px var(--border-subtle); transition: box-shadow .16s, transform .16s; }
  .pdp-gal__thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s cubic-bezier(.2,.7,.2,1); }
  .pdp-gal__thumb:hover { box-shadow: inset 0 0 0 1px var(--border-strong); }
  .pdp-gal__thumb:hover img { transform: scale(1.06); }
  .pdp-gal__thumb:focus-visible { box-shadow: var(--shadow-focus-brand); }
  .pdp-gal__thumb--active { box-shadow: 0 0 0 2px var(--brand-primary); }
  .pdp-gal__thumb--active::after { content: ""; position: absolute; inset: 0; border-radius: inherit; box-shadow: inset 0 0 0 3px var(--surface-card); pointer-events: none; }
  .pdp-gal__thumb--active img { transform: none; }
  .pdp-gal__more { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: rgba(11,32,24,.62); color: #fff; backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px); transition: background-color .16s; }
  .pdp-gal__thumb--more:hover .pdp-gal__more { background: rgba(11,32,24,.72); }
  .pdp-gal__more b { font-family: var(--font-display); font-weight: 600; font-size: 22px; line-height: 1; font-variant-numeric: tabular-nums; }
  .pdp-gal__more span { font-family: var(--font-sans); font-size: 11.5px; font-weight: 600; letter-spacing: .02em; opacity: .92; }
  .pdp-gal__collapse { margin-top: 14px; display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px; border: 1px solid var(--border-default); border-radius: var(--radius-pill); background: var(--surface-card); color: var(--text-secondary); font-family: var(--font-sans); font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-xs); transition: border-color .15s, color .15s, background-color .15s; }
  .pdp-gal__collapse:hover { border-color: var(--border-strong); color: var(--text-primary); background: var(--gray-50); }
  .pdp-gal__collapse svg { color: var(--green-600); }

  /* ============ BODY GRID ============ */
  .pdp-body { display: grid; grid-template-columns: minmax(0, 1fr) 384px; gap: 40px; align-items: start; padding-top: 28px; }
  .pdp-content { min-width: 0; display: flex; flex-direction: column; }
  .pdp-aside { position: sticky; top: 24px; }

  /* quick facts strip */
  .pdp-facts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-card); box-shadow: var(--shadow-card); overflow: hidden; margin-bottom: 36px; }
  .pdp-fact { display: flex; flex-direction: column; gap: 10px; padding: 20px 20px; }
  .pdp-fact__row { display: flex; align-items: center; gap: 11px; }
  .pdp-fact + .pdp-fact { border-left: 1px solid var(--border-subtle); }
  .pdp-fact__ic { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: var(--radius-md); background: var(--green-50); color: var(--green-700); }
  .pdp-fact__val { font-family: var(--font-sans); font-size: 22px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
  .pdp-fact__lbl { font-family: var(--font-sans); font-size: 12.5px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; color: var(--text-tertiary); }

  /* generic section */
  .pdp-sec { padding: 32px 0; border-top: 1px solid var(--border-subtle); }
  .pdp-sec:first-child { border-top: none; padding-top: 0; }
  .pdp-sec__title { font-family: var(--font-display); font-weight: 600; font-size: 26px; letter-spacing: -0.015em; color: var(--text-primary); margin: 0 0 18px; }
  .pdp-sec__title--row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }

  /* description */
  .pdp-desc { font-family: var(--font-sans); font-size: 16px; line-height: 27px; color: var(--text-secondary); }
  .pdp-desc p { margin: 0 0 16px; }
  .pdp-desc p:last-child { margin-bottom: 0; }
  .pdp-desc--clamped { position: relative; max-height: 150px; overflow: hidden; -webkit-mask-image: linear-gradient(to bottom, #000 64%, transparent); mask-image: linear-gradient(to bottom, #000 64%, transparent); }
  .pdp-readmore { display: inline-flex; align-items: center; gap: 7px; margin-top: 16px; background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 14.5px; font-weight: 600; color: var(--brand-primary); padding: 0; transition: gap .16s; white-space: nowrap; }
  .pdp-readmore:hover { gap: 11px; }

  /* features grid */
  .pdp-fgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .pdp-frow { display: flex; align-items: center; gap: 13px; padding: 15px 16px; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); }
  .pdp-frow__ic { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--surface-page); color: var(--green-600); flex: none; }
  .pdp-frow__txt { min-width: 0; flex: 1; }
  .pdp-frow__lbl { font-family: var(--font-sans); font-size: 12.5px; font-weight: 500; color: var(--text-tertiary); }
  .pdp-frow__val { font-family: var(--font-sans); font-size: 15px; font-weight: 600; color: var(--text-primary); margin-top: 2px; }

  /* amenities */
  .pdp-amen { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 20px; }
  .pdp-amenrow { display: flex; align-items: center; gap: 11px; font-family: var(--font-sans); font-size: 14.5px; font-weight: 500; color: var(--text-primary); }
  .pdp-amenrow__ic { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; background: var(--green-50); color: var(--green-700); flex: none; }

  /* location */
  .pdp-loc { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .pdp-loc__map { border: 1px solid var(--border-subtle); border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-card); }
  .pdp-loc__map--real { position: relative; }
  .pdp-loc__frame { display: block; width: 100%; height: 380px; border: 0; }
  .pdp-loc__badge { position: absolute; top: 14px; left: 14px; display: inline-flex; align-items: center; gap: 7px; padding: 8px 13px; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 999px; box-shadow: var(--shadow-card); font-family: var(--font-sans); font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
  .pdp-loc__badge svg { color: var(--green-600); }
  .pdp-loc__expand { position: absolute; bottom: 14px; right: 14px; display: inline-flex; align-items: center; gap: 7px; padding: 8px 13px; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); box-shadow: var(--shadow-card); font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--text-primary); text-decoration: none; transition: background .15s ease; }
  .pdp-loc__expand:hover { background: var(--green-50); }
  .pdp-loc__meta { display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px; }
  .pdp-loc__card { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-card); box-shadow: var(--shadow-card); padding: 20px 22px; }
  .pdp-loc__lbl { font-family: var(--font-sans); font-size: 11.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; }
  .pdp-loc__addr { display: flex; align-items: flex-start; gap: 11px; font-family: var(--font-sans); font-size: 15.5px; line-height: 23px; color: var(--text-primary); }
  .pdp-loc__addr svg { color: var(--green-600); flex: none; margin-top: 2px; }
  .pdp-nearby { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
  .pdp-nearby li { display: flex; align-items: center; gap: 12px; padding: 9px 0; }
  .pdp-nearby li + li { border-top: 1px solid var(--border-subtle); }
  .pdp-nearby__ic { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: var(--radius-md); background: var(--surface-page); color: var(--green-600); flex: none; }
  .pdp-nearby__name { flex: 1; font-family: var(--font-sans); font-size: 14.5px; font-weight: 500; color: var(--text-primary); }
  .pdp-nearby__time { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }

  /* floor plan */
  .pdp-floor { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
  .pdp-floor__plan { position: relative; border: 1px solid var(--border-subtle); border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-card); background: var(--surface-card); aspect-ratio: 16/10; }
  .pdp-floor__plan img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pdp-floor__expand { position: absolute; bottom: 14px; right: 14px; display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 15px; border: none; border-radius: var(--radius-pill); background: var(--surface-card); color: var(--text-primary); font-family: var(--font-sans); font-size: 13.5px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-md); white-space: nowrap; }
  .pdp-floor__expand svg { color: var(--green-600); }
  .pdp-doc { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-card); box-shadow: var(--shadow-card); padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .pdp-docrow { display: flex; align-items: center; gap: 13px; }
  .pdp-docrow__ic { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: var(--radius-md); background: var(--brand-subtle); color: var(--green-700); flex: none; }
  .pdp-docrow__txt b { display: block; font-family: var(--font-sans); font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .pdp-docrow__txt span { font-family: var(--font-sans); font-size: 13px; color: var(--text-tertiary); }

  /* ============ STICKY ACTION PANEL ============ */
  .pdp-panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-card); box-shadow: var(--shadow-lg); overflow: hidden; }
  .pdp-panel__head { padding: 20px 22px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .pdp-panel__price { font-family: var(--font-sans); font-weight: 700; font-size: 28px; letter-spacing: -0.01em; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
  .pdp-panel__pricesub { font-family: var(--font-sans); font-size: 13px; color: var(--text-tertiary); margin-top: 7px; display: inline-flex; align-items: center; gap: 6px; }
  .pdp-panel__pricesub svg { color: var(--green-600); }
  .pdp-panel__body { padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }

  /* agent block */
  .pdp-agent { display: flex; align-items: center; gap: 13px; }
  .pdp-agent--link { cursor: pointer; margin: -10px -12px 0; padding: 10px 12px; border-radius: var(--radius-md); transition: background-color .15s; outline: none; }
  .pdp-agent--link:hover { background: var(--gray-50); }
  .pdp-agent--link:focus-visible { box-shadow: var(--shadow-focus-brand); }
  .pdp-agent__go { color: var(--text-tertiary); flex: none; transition: transform .15s, color .15s; }
  .pdp-agent--link:hover .pdp-agent__go { color: var(--brand-primary); transform: translateX(2px); }
  .pdp-agent__main { min-width: 0; flex: 1; }
  .pdp-agent__name { display: flex; align-items: center; gap: 7px; font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--text-primary); line-height: 1.2; }
  .pdp-agent__agency { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-sans); font-size: 13px; color: var(--text-tertiary); margin-top: 3px; }
  .pdp-agent__rating { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--text-primary); margin-top: 6px; }
  .pdp-agent__rating svg { color: var(--brand-accent); }
  .pdp-agent__rating span { color: var(--text-tertiary); font-weight: 500; }
  .pdp-agent__responds { display: inline-flex; align-items: center; gap: 7px; padding: 10px 12px; background: var(--surface-page); border-radius: var(--radius-md); font-family: var(--font-sans); font-size: 12.5px; color: var(--text-secondary); }
  .pdp-agent__responds svg { color: var(--success-500); flex: none; }

  /* contact buttons */
  .pdp-cta { display: flex; flex-direction: column; gap: 10px; }
  .pdp-wa { display: inline-flex; align-items: center; justify-content: center; gap: 9px; width: 100%; height: 52px; border: none; border-radius: var(--radius-control); background: var(--brand-primary); color: #fff; font-family: var(--font-sans); font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-sm); transition: background-color .15s, transform .06s; }
  .pdp-wa:hover { background: var(--brand-primary-hover); }
  .pdp-wa:active { transform: translateY(.5px); }
  .pdp-book { display: inline-flex; align-items: center; justify-content: center; gap: 9px; width: 100%; height: 50px; border: 1px solid var(--brand-accent); border-radius: var(--radius-control); background: var(--brand-accent-subtle); color: var(--gold-700); font-family: var(--font-sans); font-size: 15.5px; font-weight: 600; cursor: pointer; transition: background-color .15s, border-color .15s; }
  .pdp-book:hover { background: var(--brand-accent); color: var(--green-900); }
  .pdp-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pdp-ghost { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 46px; border: 1px solid var(--border-default); border-radius: var(--radius-control); background: var(--surface-card); color: var(--gray-800); font-family: var(--font-sans); font-size: 14.5px; font-weight: 600; cursor: pointer; transition: background-color .15s, border-color .15s; }
  .pdp-ghost:hover { background: var(--gray-50); border-color: var(--border-strong); }
  .pdp-ghost svg { color: var(--green-600); }
  .pdp-panel__safety { display: flex; align-items: center; justify-content: center; gap: 7px; font-family: var(--font-sans); font-size: 12px; color: var(--text-tertiary); padding-top: 2px; }
  .pdp-panel__safety svg { color: var(--green-500); }

  /* ============ SIMILAR PROPERTIES ============ */
  .pdp-similar { padding: 64px 0 72px; border-top: 1px solid var(--border-subtle); margin-top: 40px; }
  .pdp-similar__head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 28px; }
  .pdp-similar__eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--brand-accent); }
  .pdp-similar__title { font-family: var(--font-display); font-weight: 600; font-size: 32px; letter-spacing: -0.02em; color: var(--text-primary); margin: 8px 0 0; white-space: nowrap; }
  .pdp-similar__link { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-size: 15px; font-weight: 600; color: var(--brand-primary); text-decoration: none; transition: gap .16s; white-space: nowrap; }
  .pdp-similar__link:hover { gap: 12px; }
  .pdp-similar__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

  /* ============ MOBILE STICKY BAR ============ */
  .pdp-mobar { display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 1500; background: var(--surface-card); border-top: 1px solid var(--border-subtle); box-shadow: 0 -6px 24px rgba(11,32,24,.10); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); }
  .pdp-mobar__inner { display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 10px; max-width: 560px; margin-inline: auto; }
  .pdp-mobar__btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; height: 50px; border-radius: var(--radius-control); font-family: var(--font-sans); font-size: 14.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-default); background: var(--surface-card); color: var(--gray-800); }
  .pdp-mobar__btn svg { color: var(--green-600); }
  .pdp-mobar__btn--wa { background: var(--brand-primary); color: #fff; border-color: transparent; }
  .pdp-mobar__btn--wa svg { color: #fff; }
  .pdp-mobar__btn--book { background: var(--brand-accent); color: var(--green-900); border-color: transparent; }
  .pdp-mobar__btn--book svg { color: var(--green-900); }

  /* book-viewing modal appointment wrapper */
  .pdp-bookmodal .cx-appt { border: none; box-shadow: none; border-radius: 0; }

  /* ============ PREMIUM CTA (dark band) ============ */
  .cxk-cta { background: var(--surface-brand-deep); position: relative; overflow: hidden; padding: 96px 0; margin-top: 8px; }
  .cxk-cta::after { content: ""; position: absolute; top: -120px; right: -80px; width: 420px; height: 420px; border-radius: 50%; background: radial-gradient(circle, rgba(201,162,75,.16), transparent 70%); pointer-events: none; }
  .cxk-cta__inner { max-width: 1320px; margin-inline: auto; padding: 0 56px; text-align: center; position: relative; z-index: 2; }
  .cxk-cta__eyebrow { color: var(--brand-accent); }
  .cxk-cta__title { font-family: var(--font-display); font-weight: 600; font-size: 46px; line-height: 1.06; letter-spacing: -0.02em; color: #fff; margin: 12px 0 14px; }
  .cxk-cta__sub { font-family: var(--font-sans); font-size: 18px; line-height: 27px; color: rgba(255,255,255,.76); margin: 0 auto 48px; max-width: 560px; }
  .cxk-cta__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; text-align: left; }
  .cxcta-card { display: flex; flex-direction: column; gap: 12px; padding: 32px 28px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.11); border-radius: var(--radius-card-lg); transition: background-color .2s ease, transform .2s ease, border-color .2s ease; }
  .cxcta-card:hover { background: rgba(255,255,255,.08); border-color: rgba(201,162,75,.4); transform: translateY(-4px); }
  .cxcta-card__ic { display: inline-flex; align-items: center; justify-content: center; width: 54px; height: 54px; border-radius: var(--radius-lg); background: var(--brand-accent); color: var(--green-900); }
  .cxcta-card__title { font-family: var(--font-display); font-weight: 600; font-size: 25px; margin: 4px 0 0; color: #fff; }
  .cxcta-card__desc { font-family: var(--font-sans); font-size: 14.5px; line-height: 22px; color: rgba(255,255,255,.70); margin: 0; flex: 1; }
  .cxcta-card__btn { display: inline-flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 6px 0 0; font-family: var(--font-sans); font-size: 15px; font-weight: 600; color: var(--brand-accent); transition: gap .18s ease; }
  .cxcta-card__btn:hover { gap: 12px; }

  /* ============ FOOTER (shared site footer) ============ */
  .cxk-footer { background: var(--gray-950); color: rgba(255,255,255,.66); }
  .cxk-footer__inner { max-width: 1440px; margin-inline: auto; padding: 72px 48px 48px; display: grid; grid-template-columns: 1.5fr 2fr; gap: 56px; }
  .cxk-footer__brand p { font-family: var(--font-sans); font-size: 14.5px; line-height: 23px; margin: 18px 0 22px; max-width: 340px; }
  .cxk-footer__brand .cx-brand__name { color: #fff; }
  /* === Brand lockup → DS primary horizontal lockup: arch symbol + CHIYA === */
  .cx-brand__mark { background: transparent !important; width: 34px; height: 34px; border-radius: 0; }
  .cx-brand__mark img { display: none; }
  .cx-brand__mark::before { content: ""; display: block; width: 34px; height: 34px;
    background: url("assets/chiya-symbol.svg") center / contain no-repeat; }
  .cx-brand__name { font-family: var(--font-display); font-size: 22px; text-transform: uppercase; letter-spacing: 0.16em; font-weight: 600; color: var(--green-700); }
  .cx-brand__tld { display: none; }
  .cxh:not(.cxh--solid) .cx-brand__mark::before { background-image: url("assets/chiya-symbol-white.svg"); }
  .cxk-footer__brand .cx-brand__mark::before { background-image: url("assets/chiya-symbol-white.svg"); }
  .cxk-footer__contact { list-style: none; padding: 0; margin: 0 0 24px; display: flex; flex-direction: column; gap: 11px; }
  .cxk-footer__contact li { display: flex; align-items: center; gap: 11px; font-family: var(--font-sans); font-size: 14px; color: rgba(255,255,255,.74); }
  .cxk-footer__contact svg { color: var(--brand-accent); flex: none; }
  .cxk-footer__social { display: flex; gap: 10px; }
  .cxk-footer__social a { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); transition: background-color .15s, color .15s; }
  .cxk-footer__social a:hover { background: var(--brand-primary); color: #fff; }
  .cxk-footer__cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 36px; }
  .cxk-footer__col h4 { font-family: var(--font-sans); font-size: 13px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: #fff; margin: 0 0 18px; }
  .cxk-footer__col a { display: block; font-family: var(--font-sans); font-size: 14.5px; color: rgba(255,255,255,.66); padding: 7px 0; text-decoration: none; transition: color .14s; }
  .cxk-footer__col a:hover { color: var(--brand-accent); }
  .cxk-footer__bar { max-width: 1440px; margin-inline: auto; padding: 24px 48px; border-top: 1px solid rgba(255,255,255,.10); display: flex; justify-content: space-between; align-items: center; gap: 20px; font-family: var(--font-sans); font-size: 13.5px; }
  .cxk-footer__right { display: flex; align-items: center; gap: 24px; }
  .cxk-footer__lang { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.82); cursor: pointer; font-family: var(--font-sans); font-size: 13px; font-weight: 600; padding: 7px 13px; border-radius: var(--radius-pill); }
  .cxk-footer__lang:hover { background: rgba(255,255,255,.12); }
  .cxk-footer__legal { display: flex; gap: 22px; }
  .cxk-footer__legal a { color: rgba(255,255,255,.66); text-decoration: none; }
  .cxk-footer__legal a:hover { color: #fff; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 1120px) {
    .pdp-body { grid-template-columns: minmax(0,1fr) 340px; gap: 28px; }
    .pdp-fgrid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 960px) {
    .cxh__nav { display: none; }
    .cxk-footer__inner { grid-template-columns: 1fr; gap: 40px; padding-inline: 28px; }
    .cxk-footer__bar { padding-inline: 28px; }
    .cxk-cta__inner { padding-inline: 28px; }
    .cxk-cta__grid { grid-template-columns: 1fr; }
    .cxk-cta__title { font-size: 36px; }
    .pdp, .cxh__inner { padding-inline: 28px; }
    .pdp-body { grid-template-columns: 1fr; }
    .pdp-aside { position: static; }
    .pdp-aside--desktop { display: none; }
    .pdp-head { flex-direction: column; align-items: flex-start; gap: 14px; }
    .pdp-head__priceblock { text-align: left; }
    .pdp-head__actions { justify-content: flex-start; margin-top: 0; }
    .pdp-gal__hero { height: 360px; }
    .pdp-similar__grid { grid-template-columns: repeat(2, 1fr); }
    .pdp-mobar { display: block; }
    body { padding-bottom: 80px; }
  }
  @media (max-width: 760px) {
    .pdp, .cxh__inner { padding-inline: 18px; }
    .cxk-footer__cols { grid-template-columns: 1fr 1fr; }
    .cxk-footer__bar { flex-direction: column; align-items: flex-start; }
    .pdp-facts { grid-template-columns: repeat(3, 1fr); }
    .pdp-fact:nth-child(4) { border-left: none; }
    .pdp-fact { border-top: 1px solid var(--border-subtle); }
    .pdp-fact:nth-child(-n+3) { border-top: none; }
    .pdp-fgrid { grid-template-columns: 1fr; }
    .pdp-amen { grid-template-columns: repeat(2, 1fr); }
    .pdp-loc__meta, .pdp-floor { grid-template-columns: 1fr; }
    .pdp-head__title { font-size: 30px; }
    .pdp-head__price { font-size: 28px; }
    .pdp-gal__hero { height: 280px; }
    .pdp-gal__nav { width: 40px; height: 40px; }
    .pdp-gal__strip--all { grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); }
    .pdp-similar__grid { grid-template-columns: 1fr; }
    .pdp-similar__head { flex-direction: column; align-items: flex-start; gap: 12px; }
  }
  @media (max-width: 480px) {
    .pdp-facts { grid-template-columns: repeat(2, 1fr); }
    .pdp-fact:nth-child(3) { border-left: none; }
    .pdp-gal__hero { height: 230px; }
    .pdp-gal__strip { gap: 8px; }
  }
</style>
